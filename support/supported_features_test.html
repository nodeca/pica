<!doctype html>
<script>
var module = { exports: {} };
</script>
<script src="../lib/supported_features.js"></script>
<script>
module.exports.get_supported_features().then(
  features => {
    console.log('supported_features:', features);
    console.table(features);
  },
  err => console.error(err)
);

let supported_features_url = new URL('../lib/supported_features.js', location.href).href;
let worker_code = [
  'var module = { exports: {} };',
  'importScripts(' + JSON.stringify(supported_features_url) + ');',
  'module.exports.get_supported_features().then(',
  '  features => {',
  '    console.log("worker supported_features:", features);',
  '    console.table(features);',
  '  },',
  '  err => console.error(err)',
  ');'
].join('\n');

new Worker(URL.createObjectURL(new Blob([ worker_code ], { type: 'application/javascript' })));
</script>
